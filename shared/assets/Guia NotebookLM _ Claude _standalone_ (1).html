  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

er); font-weight: 700; }\n.copy-btn {\n  position: absolute;\n  top: 14px; right: 14px;\n  background: rgba(255,255,255,0.08);\n  border: 1px solid rgba(255,255,255,0.12);\n  color: rgba(255,255,255,0.6);\n  font-family: 'Kanit', sans-serif;\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.05em;\n  padding: 5px 12px;\n  border-radius: 6px;\n  cursor: pointer;\n  transition: all 0.2s ease;\n}\n.copy-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }\n.copy-btn.copied { background: var(--purple); border-color: var(--purple); color: #fff; }\n\n/* Tips */\n.tip {\n  background: rgba(128,0,252,0.05);\n  border-left: 3px solid var(--purple);\n  border-radius: 0 var(--radius-md) var(--radius-md) 0;\n  padding: 14px 16px;\n  margin: 16px 0;\n  font-size: 14px;\n  color: var(--gray-800);\n  line-height: 1.55;\n  display: flex;\n  gap: 10px;\n  align-items: flex-start;\n}\n.tip-icon { flex-shrink: 0; color: var(--purple); margin-top: 1px; }\n.warning {\n  background: rgba(227,0,255,0.05);\n  border-left: 3px solid var(--magenta);\n  border-radius: 0 var(--radius-md) var(--radius-md) 0;\n  padding: 14px 16px;\n  margin: 16px 0;\n  font-size: 14px;\n  color: var(--gray-800);\n  line-height: 1.55;\n  display: flex;\n  gap: 10px;\n  align-items: flex-start;\n}\n.warning .tip-icon { color: var(--magenta); }\n\n.step-mark-btn {\n  margin-top: 20px;\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  background: var(--grad);\n  color: #fff;\n  font-family: 'Kanit', sans-serif;\n  font-size: 14px;\n  font-weight: 600;\n  padding: 11px 22px;\n  border-radius: 100px;\n  border: none;\n  cursor: pointer;\n  transition: opacity 0.2s ease, transform 0.2s ease;\n}\n.step-mark-btn:hover { opacity: 0.9; transform: translateY(-1px); }\n.step-card.done .step-mark-btn {\n  background: var(--gray-100);\n  color: var(--gray-500);\n}\n\n/* ── USAGE EXAMPLES ── */\n.examples { display: flex; flex-direction: column; gap: 12px; margin-bottom: 48px; }\n.example-card {\n  background: #fff;\n  border: 1px solid var(--gray-200);\n  border-radius: var(--radius-lg);\n  padding: 20px 24px;\n  transition: box-shadow 0.2s ease, transform 0.2s ease;\n}\n.example-card:hover {\n  box-shadow: var(--shadow-hover);\n  transform: translateY(-2px);\n}\n.example-label {\n  font-family: 'Kanit', sans-serif;\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--purple);\n  margin-bottom: 10px;\n}\n.example-prompt {\n  font-size: 15px;\n  color: var(--gray-800);\n  line-height: 1.55;\n  font-style: italic;\n}\n\n/* ── CONCEPTS TABLE ── */\n.concepts-table {\n  width: 100%;\n  border-collapse: collapse;\n  background: #fff;\n  border-radius: var(--radius-lg);\n  overflow: hidden;\n  box-shadow: var(--shadow-card);\n  margin-bottom: 48px;\n}\n.concepts-table th {\n  background: var(--deep-purple);\n  color: var(--lavender);\n  font-family: 'Kanit', sans-serif;\n  font-size: 12px;\n  font-weight: 600;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  padding: 14px 20px;\n  text-align: left;\n}\n.concepts-table th:first-child {\n  background: linear-gradient(90deg, #0530FA, #8000FC);\n  color: #fff;\n}\n.concepts-table td {\n  padding: 14px 20px;\n  font-size: 14px;\n  color: var(--gray-800);\n  border-bottom: 1px solid var(--gray-100);\n  vertical-align: top;\n}\n.concepts-table tr:last-child td { border-bottom: none; }\n.concepts-table td:first-child {\n  font-family: 'Kanit', sans-serif;\n  font-weight: 600;\n  color: var(--purple);\n  font-size: 15px;\n}\n.concepts-table tr:hover td { background: var(--gray-50); }\n\n/* ── SPECIAL CASE ── */\n.special-case {\n  background: var(--deep-purple);\n  border-radius: var(--radius-lg);\n  padding: 28px 32px;\n  margin-bottom: 48px;\n}\n.special-case .section-tag { background: rgba(196,168,255,0.15); border-color: rgba(196,168,255,0.3); color: var(--lavender); }\n.special-case .section-title { color: #fff; }\n.special-case .section-he div class=\"prereq-title\">Python instalado en Windows<\u002Fdiv>\n        <div class=\"prereq-desc\">Verifica abriendo PowerShell y escribiendo: <code style=\"font-size:12px;background:var(--gray-100);padding:2px 6px;border-radius:4px;\">python --version<\u002Fcode><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"prereq-card\">\n      <div class=\"prereq-num\">04<\u002Fdiv>\n      <div>\n        <div class=\"prereq-title\">Suscripción de pago a Claude<\u002Fdiv>\n        <div class=\"prereq-desc\">Plan Pro, Max, Team o Enterprise<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- STEPS -->\n  <div class=\"section-header\">\n    <span class=\"section-tag\">// Instalación<\u002Fspan>\n    <span class=\"section-title\">Proceso paso a paso<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- Success banner -->\n  <div class=\"success-banner\" id=\"successBanner\">\n    <svg width=\"40\" height=\"40\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"2.5\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg>\n    <div class=\"success-text\">\n      <h3>Conexion completada<\u002Fh3>\n      <p>NotebookLM ya esta conectado a Claude. Prueba escribir: \"Lista mis notebooks de NotebookLM\"<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"steps\" id=\"stepsContainer\">\n\n    <!-- STEP 1 -->\n    <div class=\"step-card open\" data-step=\"1\">\n      <div class=\"step-header\" onclick=\"toggleStep(this)\">\n        <div class=\"step-checkbox\" onclick=\"markStep(event, this)\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"3\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <span class=\"step-num\">PASO 01<\u002Fspan>\n        <span class=\"step-title\">Instalar el conector de NotebookLM<\u002Fspan>\n        <svg class=\"step-chevron\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"step-body\">\n        <p class=\"step-desc\">Abre PowerShell (busca \"PowerShell\" en el menú Inicio) y ejecuta el siguiente comando. Verás mucho texto descargándose — es normal. Cuando termine verás \"Successfully installed\".<\u002Fp>\n        <div class=\"code-block\">\n          <div class=\"code-label\">PowerShell<\u002Fdiv>\n          <button class=\"copy-btn\" onclick=\"copyCode(this, 'python -m pip install notebooklm-mcp-cli')\">Copiar<\u002Fbutton>\n          <div class=\"code-text\">python -m pip install notebooklm-mcp-cli<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STEP 2 -->\n    <div class=\"step-card\" data-step=\"2\">\n      <div class=\"step-header\" onclick=\"toggleStep(this)\">\n        <div class=\"step-checkbox\" onclick=\"markStep(event, this)\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"3\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <span class=\"step-num\">PASO 02<\u002Fspan>\n        <span class=\"step-title\">Autenticarte con Google (una sola vez)<\u002Fspan>\n        <svg class=\"step-chevron\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"step-body\">\n        <p class=\"step-desc\">En la misma ventana de PowerShell, ejecuta el siguiente comando. Sustituye <strong>TU_USUARIO<\u002Fstrong> por tu nombre de Windows.<\u002Fp>\n        <div class=\"tip\">\n          <span class=\"tip-icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          Para saber tu nombre de usuario exacto, abre PowerShell y escribe: <code style=\"background:rgba(128,0,252,0.08);padding:2px 6px;border-radius:4px;font-size:13px;\">echo %USERNAME%<\u002Fcode>\n        <\u002Fdiv>\n        <div class=\"code-block\">\n          <div class=\"code-label\">PowerShell<\u002Fdiv>\n          <button class=\"copy-btn\" onclick=\"copyCode(this, 'C:\\\\Users\\\\TU_USUARIO\\\\AppData\\\\Local\\\\Python\\\\pythoncore-3.14-64\\\\Scripts\\\\nlm.exe login')\">Copiar<\u002Fbutton>\n          <div class=\"code-text\">C:\\Users\\<span class=\"highlight\">TU_USUARIO<\u002Fspan>\\AppData\\Local\\Python\\pythoncore-3.14-64\\Scripts\\nlm.exe login<\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"step-desc\">Se abrirá el navegador para que inicies sesión con tu cuenta de Google. Solo se hace una vez.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STEP 3 -->\n    <div class=\"step-card\" data-step=\"3\">\n      <div class=\"step-header\" onclick=\"toggleStep(this)\">\n        <div class=\"step-checkbox\" onclick=\"markStep(event, this)\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"3\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <span class=\"step-num\">PASO 03<\u002Fspan>\n        <span class=\"step-title\">Abrir el archivo de configuración de Claude<\u002Fspan>\n        <svg class=\"step-chevron\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"step-body\">\n        <p class=\"step-desc\">Pulsa <strong>Win + R<\u002Fstrong> en tu teclado y escribe lo siguiente en la ventana que aparece, luego pulsa Enter:<\u002Fp>\n        <div class=\"code-block\">\n          <div class=\"code-label\">Ejecutar (Win + R)<\u002Fdiv>\n          <button class=\"copy-btn\" onclick=\"copyCode(this, '%APPDATA%\\\\Claude')\">Copiar<\u002Fbutton>\n          <div class=\"code-text\">%APPDATA%\\Claude<\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"step-desc\">Se abrirá una carpeta. Busca el archivo <strong>claude_desktop_config.json<\u002Fstrong> y ábrelo con el Bloc de notas.<\u002Fp>\n        <div class=\"tip\">\n          <span class=\"tip-icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          Si el archivo no existe: clic derecho en la carpeta → Nuevo → Documento de texto → renómbralo como <code style=\"background:rgba(128,0,252,0.08);padding:2px 6px;border-radius:4px;font-size:13px;\">claude_desktop_config.json<\u002Fcode> (elimina la extensión .txt al final).\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STEP 4 -->\n    <div class=\"step-card\" data-step=\"4\">\n      <div class=\"step-header\" onclick=\"toggleStep(this)\">\n        <div class=\"step-checkbox\" onclick=\"markStep(event, this)\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"3\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <span class=\"step-num\">PASO 04<\u002Fspan>\n        <span class=\"step-title\">Añadir la configuración del MCP<\u002Fspan>\n        <svg class=\"step-chevron\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"step-body\">\n        <p class=\"step-desc\">Borra todo el contenido del archivo y pega lo siguiente. Reemplaza <strong>TU_USUARIO<\u002Fstrong> por tu nombre de usuario de Windows:<\u002Fp>\n        <div class=\"code-block\">\n          <div class=\"code-label\">claude_desktop_config.json<\u002Fdiv>\n          <button class=\"copy-btn\" onclick=\"copyCode(this, `{\\n  \\\" mcpservers\\\":=\"\" {\\n=\"\" \\\"notebooklm\\\":=\"\" \\\"command\\\":=\"\" \\\"c:\\\\\\\\users\\\\\\\\tu_usuario\\\\\\\\appdata\\\\\\\\local\\\\\\\\python\\\\\\\\pythoncore-3.14-64\\\\\\\\scripts\\\\\\\\notebooklm-mcp.exe\\\",\\n=\"\" \\\"args\\\":=\"\" []\\n=\"\" }\\n=\"\" }\\n}`)\"=\"\">Copiar<\u002Fbutton>\n          <div class=\"code-text\">{\n  \"mcpServers\": {\n    \"notebooklm\": {\n      \"command\": \"C:\\\\Users\\\\<span class=\"highlight\">TU_USUARIO<\u002Fspan>\\\\AppData\\\\Local\\\\\n      Python\\\\pythoncore-3.14-64\\\\Scripts\\\\\n      notebooklm-mcp.exe\",\n      \"args\": []\n    }\n  }\n}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"warning\">\n          <span class=\"tip-icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fspan>\n          Si el archivo ya tenía contenido (otros MCPs, preferences), no lo borres. Consulta la sección \"Caso especial\" al final.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STEP 5 -->\n    <div class=\"step-card\" data-step=\"5\">\n      <div class=\"step-header\" onclick=\"toggleStep(this)\">\n        <div class=\"step-checkbox\" onclick=\"markStep(event, this)\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"3\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <span class=\"step-num\">PASO 05<\u002Fspan>\n        <span class=\"step-title\">Reiniciar Claude Desktop<\u002Fspan>\n        <svg class=\"step-chevron\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"step-body\">\n        <p class=\"step-desc\">Cierra la aplicación completamente — incluyendo el icono en la bandeja del sistema (esquina inferior derecha de Windows).<\u002Fp>\n        <div class=\"tip\">\n          <span class=\"tip-icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          Haz clic derecho sobre el icono de Claude en la bandeja del sistema → Salir. Luego vuelve a abrirla.\n        <\u002Fdiv>\n        <div class=\"warning\">\n          <span class=\"tip-icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fspan>\n          Si no cierras desde la bandeja del sistema, el cambio no tendrá efecto.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STEP 6 -->\n    <div class=\"step-card\" data-step=\"6\">\n      <div class=\"step-header\" onclick=\"toggleStep(this)\">\n        <div class=\"step-checkbox\" onclick=\"markStep(event, this)\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"3\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <span class=\"step-num\">PASO 06<\u002Fspan>\n        <span class=\"step-title\">Verificar la conexión<\u002Fspan>\n        <svg class=\"step-chevron\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"step-body\">\n        <p class=\"step-desc\">Abre una nueva conversación en Claude (Chat o Cowork) y escribe:<\u002Fp>\n        <div class=\"code-block\">\n          <div class=\"code-label\">Prompt de prueba<\u002Fdiv>\n          <button class=\"copy-btn\" onclick=\"copyCode(this, 'Lista todos mis notebooks de NotebookLM')\">Copiar<\u002Fbutton>\n          <div class=\"code-text\">Lista todos mis notebooks de NotebookLM<\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"step-desc\">Claude debería devolverte la lista de notebooks de tu cuenta. Si es así, la conexión está activa.<\u002Fp>\n        <div class=\"warning\">\n          <span class=\"tip-icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fspan>\n          Error \"spawn uvx ENOENT\": la ruta en el paso 04 no es correcta. Revisa que termine en <code style=\"background:rgba(227,0,255,0.08);padding:2px 5px;border-radius:4px;font-size:12px;\">notebooklm-mcp.exe<\u002Fcode> y que TU_USUARIO esté bien escrito.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- CASO ESPECIAL -->\n  <div class=\"special-case\">\n    <div class=\"section-header\">\n      <span class=\"section-tag\">// Caso especial<\u002Fspan>\n      <span class=\"section-title\" style=\"color:#fff;\">El archivo ya tenía contenido<\u002Fspan>\n    <\u002Fdiv>\n    <p class=\"special-case-desc\">Si tu claude_desktop_config.json ya tenía configuraciones previas — otros MCPs, preferences, etc. — no lo sobreescribas. Añade solo el bloque de notebooklm dentro del objeto mcpServers existente:<\u002Fp>\n    <div class=\"code-block\">\n      <div class=\"code-label\">Añadir dentro de mcpServers existente<\u002Fdiv>\n      <div class=\"code-text\">{\n  \"preferences\": {\n    \"coworkScheduledTasksEnabled\": true\n  },\n  \"mcpServers\": {\n    \"otro-mcp-existente\": { ... },\n    \"<span class=\"highlight\">notebooklm<\u002Fspan>\": {\n      \"command\": \"C:\\\\Users\\\\<span class=\"highlight\">TU_USUARIO<\u002Fspan>\\\\...\\\\notebooklm-mcp.exe\",\n      \"args\": []\n    }\n  }\n}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- USO -->\n  <div class=\"section-header\">\n    <span class=\"section-tag\">// Uso<\u002Fspan>\n    <span class=\"section-title\">Ejemplos de prompts<\u002Fspan>\n  <\u002Fdiv>\n  <p style=\"font-size:15px;color:var(--gray-500);margin-bottom:24px;line-height:1.6;\">El MCP está activo en todas tus conversaciones — no necesitas activarlo cada vez. Simplemente menciona tu notebook en el prompt:<\u002Fp>\n  <div class=\"examples\">\n    <div class=\"example-card\">\n      <div class=\"example-label\">Consultar un libro<\u002Fdiv>\n      <div class=\"example-prompt\">\"Usando mi notebook 'Hormozi - 100M Offers', dame los principios clave para estructurar una oferta de consultoría de 4.000 euros/mes\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"example-card\">\n      <div class=\"example-label\">Ver tus notebooks disponibles<\u002Fdiv>\n      <div class=\"example-prompt\">\"Lista mis notebooks de NotebookLM y dime cuáles tienen contenido sobre marketing o ventas\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"example-card\">\n      <div class=\"example-label\">Tarea concreta con contexto<\u002Fdiv>\n      <div class=\"example-prompt\">\"Tengo que escribir una propuesta para un cliente. Consulta mi notebook de Hormozi y extrae los marcos de pricing que pueda aplicar\"<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tip\" style=\"margin-bottom:48px;\">\n    <span class=\"tip-icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n    Recuerda subir primero los PDFs de tus libros a NotebookLM en notebooklm.google.com antes de consultarlos desde Claude.\n  <\u002Fdiv>\n\n  <!-- CONCEPTOS -->\n  <div class=\"section-header\">\n    <span class=\"section-tag\">// Conceptos<\u002Fspan>\n    <span class=\"section-title\">MCP vs Skill — diferencia clave<\u002Fspan>\n  <\u002Fdiv>\n  <table class=\"concepts-table\">\n    <thead>\n      <tr>\n        <th><\u002Fth>\n        <th>MCP (lo que instalaste)<\u002Fth>\n        <th>Skill<\u002Fth>\n      <\u002Ftr>\n    <\u002Fthead>\n    <tbody>\n      <tr>\n        <td>Qué es<\u002Ftd>\n        <td>Conexión a herramienta externa<\u002Ftd>\n        <td>Instrucciones de comportamiento<\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td>Dónde vive<\u002Ftd>\n        <td>Archivo config de Claude Desktop<\u002Ftd>\n        <td>Cuenta de Claude (Personalizar)<\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td>Dónde funciona<\u002Ftd>\n        <td>Chat + Cowork (app escritorio)<\u002Ftd>\n        <td>Chat + Cowork + Excel + PowerPoint<\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td>Ejemplo<\u002Ftd>\n        <td>NotebookLM, Google Drive, n8n<\u002Ftd>\n        <td>Estilo de escritura, formato de informes<\u002Ftd>\n      <\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n<\u002Fmain>\n\n<!-- FOOTER -->\n<footer class=\"footer\">\n  <div class=\"footer-logo\"><img src=\"fd037ea1-c752-49ca-8bb6-ff8ca93e0982\" alt=\"Riqueza Digital\"><\u002Fdiv>\n  <span class=\"footer-text\">Kevin Berbel · Arquitecto de Sistemas Técnicos<\u002Fspan>\n  <a href=\"https://riquezadigital.es\" class=\"footer-link\" target=\"_blank\">riquezadigital.es<\u002Fa>\n<\u002Ffooter>\n\n<script>\nconst TOTAL_STEPS = 6;\n\nfunction getState() {\n  try { return JSON.parse(localStorage.getItem('nlm_guide_steps') || '{}'); } catch { return {}; }\n}\nfunction saveState(s) { localStorage.setItem('nlm_guide_steps', JSON.stringify(s)); }\n\nfunction updateProgress() {\n  const state = getState();\n  const done = Object.values(state).filter(Boolean).length;\n  document.getElementById('progressFill').style.width = (done / TOTAL_STEPS * 100) + '%';\n  document.getElementById('progressCount').textContent = done + ' / ' + TOTAL_STEPS;\n  const banner = document.getElementById('successBanner');\n  if (done === TOTAL_STEPS) {\n    banner.classList.add('visible');\n    banner.scrollIntoView({block: 'nearest', behavior: 'smooth'});\n  } else {\n    banner.classList.remove('visible');\n  }\n}\n\nfunction markStep(e, checkbox) {\n  e.stopPropagation();\n  const card = checkbox.closest('.step-card');\n  const step = card.dataset.step;\n  const state = getState();\n  state[step] = !state[step];\n  saveState(state);\n  card.classList.toggle('done', !!state[step]);\n  updateProgress();\n}\n\nfunction toggleStep(header) {\n  const card = header.closest('.step-card');\n  card.classList.toggle('open');\n}\n\nfunction copyCode(btn, text) {\n  navigator.clipboard.writeText(text).then(() => {\n    btn.textContent = 'Copiado';\n    btn.classList.add('copied');\n    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 1800);\n  });\n}\n\n// Init from localStorage\nfunction init() {\n  const state = getState();\n  document.querySelectorAll('.step-card').forEach(card => {\n    const step = card.dataset.step;\n    if (state[step]) card.classList.add('done');\n  });\n  updateProgress();\n}\n\ninit();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
