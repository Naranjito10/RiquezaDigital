<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080,height=1920">
  <title>Intro — Riqueza Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Inter+Tight:wght@400;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      background: #21123D;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Gradiente de fondo animado */
    .bg-glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 600px at 50% 40%, rgba(128,0,252,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 400px 400px at 20% 80%, rgba(227,0,255,0.12) 0%, transparent 60%);
      opacity: 0;
    }

    /* Línea horizontal de marca */
    .brand-line {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #8000FC, #E300FF, #8000FC, transparent);
    }

    .container {
      position: relative;
      text-align: center;
      padding: 0 80px;
      z-index: 10;
    }

    /* Icono / símbolo superior */
    .icon-wrap {
      margin-bottom: 48px;
      opacity: 0;
      transform: scale(0.6);
    }

    .icon-diamond {
      display: inline-block;
      width: 20px;
      height: 20px;
      background: #8000FC;
      transform: rotate(45deg);
      box-shadow: 0 0 30px rgba(128,0,252,0.8), 0 0 60px rgba(128,0,252,0.4);
    }

    /* Título principal — Fraunces serif */
    .title {
      font-family: 'Fraunces', 'Times New Roman', serif;
      font-size: 96px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: 2px;
      line-height: 1.1;
      opacity: 0;
      transform: translateY(24px);
    }

    .title strong {
      font-weight: 600;
      font-style: italic;
    }

    /* Línea decorativa bajo el título */
    .divider {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(128,0,252,0.6), transparent);
      margin: 32px auto;
    }

    /* Tagline — Inter Tight */
    .tagline {
      font-family: 'Inter Tight', sans-serif;
      font-size: 22px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      letter-spacing: 5px;
      text-transform: uppercase;
      opacity: 0;
    }

    .tagline span {
      color: #8000FC;
    }
  </style>
</head>
<body>
  <div class="bg-glow" id="bgGlow"></div>
  <div class="brand-line" id="brandLine"></div>

  <div class="container">
    <div class="icon-wrap" id="icon">
      <div class="icon-diamond"></div>
    </div>

    <h1 class="title" id="title">
      Riqueza<br><strong>Digital</strong>
    </h1>

    <div class="divider" id="divider"></div>

    <p class="tagline" id="tagline">
      Libertad · <span>Inversión</span> · Comunidad
    </p>
  </div>

  <script>
    const tl = gsap.timeline({ paused: true });

    tl
      // 0.0s — glow de fondo aparece
      .to("#bgGlow",    { opacity: 1, duration: 1.0, ease: "power2.out" }, 0)

      // 0.2s — línea horizontal pasa de 0 a ancho completo
      .to("#brandLine", { width: "100%", duration: 0.5, ease: "power3.inOut" }, 0.2)

      // 0.5s — icono diamante entra con pop
      .to("#icon", { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)" }, 0.5)

      // 0.9s — título sube y aparece
      .to("#title", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0.9)

      // 1.4s — divider se expande
      .to("#divider", { width: 280, duration: 0.4, ease: "power2.inOut" }, 1.4)

      // 1.7s — tagline fade in
      .to("#tagline", { opacity: 1, duration: 0.5, ease: "power2.out" }, 1.7)

      // 2.2s–4.0s — hold final
      .to({}, { duration: 1.8 }, 2.2);

    window.__hyperframes_timeline = tl;
    window.__hyperframes_duration  = tl.totalDuration();
  </script>
</body>
</html>
